<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选号模拟</title>
    <link rel="stylesheet" href="styles.css?v=20260513-10" />
  </head>
  <body>
    <section id="appLock" class="app-lock">
      <div class="lock-panel">
        <span class="brand-mark"></span>
        <h1>选号模拟</h1>
        <p>请输入密码打开页面。</p>
        <div class="lock-form">
          <input id="appPassword" type="password" maxlength="32" placeholder="页面密码" autocomplete="current-password" />
          <button id="toggleAppPasswordButton" type="button">显示</button>
          <button id="unlockAppButton" type="button">进入</button>
        </div>
        <p id="appAuthMessage" class="auth-message"></p>
      </div>
    </section>

    <main id="appRoot" class="app" hidden>
      <section class="toolbar" aria-label="操作栏">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>选号模拟</h1>
            <p>点击格子添加球，颜色和编号都可以自定义。</p>
          </div>
        </div>

        <div class="controls">
          <label>
            <span>行</span>
            <input id="rowInput" type="number" min="1" max="55" value="1" />
          </label>
          <label>
            <span>区</span>
            <select id="zoneInput">
              <option value="front">前区</option>
              <option value="back">后区</option>
            </select>
          </label>
          <label>
            <span>号码</span>
            <input id="numberInput" type="number" min="1" max="35" value="1" />
          </label>
          <label>
            <span>球色</span>
            <input id="colorInput" type="color" value="#d6202a" />
          </label>
          <label>
            <span>大小</span>
            <input id="sizeInput" type="range" min="20" max="34" value="25" />
          </label>
          <label>
            <span>缩放</span>
            <input id="zoomInput" type="range" min="30" max="130" value="100" />
          </label>
          <button id="addBallButton" type="button">添加球</button>
          <button id="eraseButton" type="button" aria-pressed="false">擦除</button>
          <button id="deleteColorButton" type="button">删此颜色</button>
          <button id="clearButton" type="button">清空</button>
        </div>
      </section>

      <section class="palette" aria-label="颜色选择">
        <button class="swatch active" type="button" data-color="#d6202a" style="--swatch: #d6202a">红</button>
        <button class="swatch" type="button" data-color="#1768b7" style="--swatch: #1768b7">蓝</button>
        <button class="swatch" type="button" data-color="#14a365" style="--swatch: #14a365">绿</button>
        <button class="swatch" type="button" data-color="#f59e0b" style="--swatch: #f59e0b">橙</button>
        <button class="swatch" type="button" data-color="#7c3aed" style="--swatch: #7c3aed">紫</button>
        <button class="swatch" type="button" data-color="#111827" style="--swatch: #111827">黑</button>
      </section>

      <section class="version-shell" aria-label="历史版本">
        <div class="history-top">
          <h2>历史版本</h2>
          <div class="version-tools">
            <input id="versionPassword" type="password" placeholder="输入密码查看版本" autocomplete="current-password" />
            <button id="unlockVersionsButton" type="button">验证</button>
            <button id="lockVersionsButton" type="button" hidden>锁定</button>
            <input id="versionSearch" type="search" placeholder="查找时间、号码、颜色" />
            <button id="clearVersionsButton" type="button">清空版本</button>
          </div>
        </div>
        <p id="versionAuthMessage" class="version-auth-message">请输入密码后查看历史版本。</p>
        <div class="version-layout">
          <ol id="versionList" class="version-list"></ol>
          <div class="version-preview">
            <h3 id="versionPreviewTitle">未选择版本</h3>
            <div id="versionPreview" class="history-balls"></div>
          </div>
        </div>
      </section>

      <section class="draw-import-shell" aria-label="生成开奖版本">
        <div class="history-top">
          <h2>生成开奖版本</h2>
          <button id="generateDrawVersionButton" type="button">生成版本</button>
          <button id="cancelEditDrawVersionButton" type="button" hidden>取消修改</button>
        </div>
        <div class="draw-import-body">
          <label>
            <span>开奖日期</span>
            <input id="drawDateInput" type="date" />
          </label>
          <textarea
            id="drawDataInput"
            placeholder="粘贴开奖数据，每行一期。例如：&#10;2026052 2026-05-13 前区 01 02 03 04 05 后区 06 07&#10;2026051 2026-05-11 13 18 28 32 33 02 11"
          ></textarea>
          <p id="drawImportMessage" class="version-auth-message">支持一行一期：前 5 个号码作为前区，后 2 个号码作为后区。</p>
        </div>
      </section>

      <section class="board-shell">
        <div class="board-top">
          <div class="status">
            <strong id="ballCount">0</strong>
            <span>个球</span>
          </div>
          <div class="board-actions">
            <button id="sampleButton" class="ghost" type="button">生成示例</button>
            <button id="saveHistoryButton" class="ghost" type="button">保存记录</button>
            <button id="saveVersionButton" class="ghost" type="button">保存版本</button>
          </div>
          <span id="currentBaseLabel" class="base-label">当前编辑：空白画面</span>
        </div>
        <div class="board-wrap">
          <div id="board" class="board" aria-label="选号走势表">
            <div>
              <div class="zone-title front-title">前区 1-35</div>
              <div id="frontBoard" class="zone-board front-board" aria-label="前区 1 到 35"></div>
            </div>
            <div>
              <div class="zone-title back-title">后区 1-12</div>
              <div id="backBoard" class="zone-board back-board" aria-label="后区 1 到 12"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="history-shell" aria-label="历史记录">
        <div class="history-top">
          <h2>操作记录</h2>
          <button id="clearHistoryButton" type="button">清空记录</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </section>

      <div id="versionModal" class="version-modal" hidden>
        <div class="version-dialog" role="dialog" aria-modal="true" aria-labelledby="versionModalTitle">
          <div class="version-dialog-top">
            <h2 id="versionModalTitle">版本详情</h2>
            <button id="closeVersionModalButton" type="button">关闭</button>
          </div>
          <div id="versionModalBody" class="version-detail-list"></div>
        </div>
      </div>
    </main>

    <script src="script.js?v=20260513-10"></script>
  </body>
</html>
